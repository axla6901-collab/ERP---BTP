# Lefthook — hooks Git pour qualité de code (M1.2 sous-phase G).
# Doc : https://lefthook.dev/configuration/
#
# Setup initial après clone :
#   pnpm install
#   pnpm exec lefthook install
#
# Désinstaller : pnpm exec lefthook uninstall

pre-commit:
  parallel: true
  jobs:
    # On ne passe PAS {staged_files} en argument : sous Windows, un gros commit
    # (refacto large, reformatage du repo, grosse MAJ de deps) dépasse la limite
    # de longueur de ligne de commande → « La ligne de commande est trop longue »,
    # ce qui forçait le --no-verify. On lance donc prettier/eslint sur TOUT le repo
    # avec cache (réexécutions rapides). Le `glob` ne sert plus qu'à activer le job
    # quand au moins un fichier du type concerné est stagé.
    - name: prettier
      glob: '*.{ts,tsx,js,jsx,json,md,yml,yaml,css}'
      run: pnpm exec prettier --check --cache .
      fail_text: 'Format non conforme. Lance : pnpm format'

    - name: eslint
      glob: '*.{ts,tsx,js,jsx}'
      run: pnpm exec next lint
      fail_text: 'Erreurs ESLint à corriger avant commit (détail : pnpm lint).'

pre-push:
  jobs:
    - name: typecheck
      run: pnpm typecheck
      fail_text: 'Erreurs TypeScript à corriger avant push.'

    - name: tests
      run: pnpm test
      fail_text: 'Tests Vitest en échec.'
